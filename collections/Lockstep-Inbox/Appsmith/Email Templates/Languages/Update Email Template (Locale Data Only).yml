uid: b2d46b6a-abfd-4586-8230-1b36ee2f9dbf
info:
  name: Update Email Template (Locale Data Only)
  type: http
  seq: 3
http:
  method: PATCH
  url: '{{BASE_URL}}/api/appsmith/v1/email_templates/update_locale_text'
  body:
    type: json
    data: |-
      {
        "subject": "Aktivieren Sie Ihren Kundenkonto-Portal-Link für <span class=\"editor-snippet\" data-lexical-snippet=\"true\" data-lexical-snippet-key=\"{{YourCompany}}\">Ihr Unternehmen</span>",
        "content": "<p style=\"margin:0\">Hallo,</p><p style=\"margin:0\"></br></p><p style=\"margin:0\">Wir haben Sie kürzlich eingeladen, Ihre Rechnungen online direkt über Ihren einzigartigen und sicheren Link einzusehen. In unserem Kundenkonto-Portal können Sie offene und geschlossene Rechnungen einsehen und herunterladen, Daten exportieren und mehr.</p><p style=\"margin:0\"></br></p><p style=\"margin:0\">Bitte beachten Sie, dass der ursprüngliche Link, den wir gesendet haben, abgelaufen ist, und wir haben einen neuen Link für Sie generiert. Um loszulegen, klicken Sie auf den untenstehenden Link.</p><p style=\"margin:0\"></br></p><p style=\"margin:0\"><span class=\"editor-snippet\" data-lexical-snippet=\"true\" data-lexical-snippet-key=\"{{PortalLink}}\">Portal-Link</span></p><p style=\"margin:0\"></br></p><p style=\"margin:0\"><span class=\"editor-snippet\" data-lexical-snippet=\"true\" data-lexical-snippet-key=\"{{YourSignature}}\">Ihre Unterschrift</span></p><p style=\"margin:0\"></br></p><p style=\"margin:0\"></br></p><p style=\"margin:0\"><strong>Diese E-Mail wurde über das Sage im Auftrag von </strong><span class=\"editor-snippet\" data-lexical-snippet=\"true\" data-lexical-snippet-key=\"{{YourCompany}}\">Ihr Unternehmen</span><strong> zugestellt. Antworten auf diese E-Mail gehen direkt an </strong><span class=\"editor-snippet\" data-lexical-snippet=\"true\" data-lexical-snippet-key=\"{{YourEmailAddress}}\">Ihre E-Mail-Adresse</span><strong>.</strong></p>",
        "locale_code": "de-DE",
        "email_template_id": 139,
        "template_description": "Benutzer erneut zum Portal einladen.",
        "template_name": "Portal-Link erneut senden"
      }
  auth:
    type: basic
    username: '{{appsmith_username}}'
    password: '{{appsmith_password}}'
