info:
  name: Manual Email Processor Sync Initialisation
  type: http
  seq: 6
http:
  method: POST
  url: '{{BASE_URL}}/api/appsmith/v1/email/:account_id/init_sync'
  body:
    type: json
    data: |-
      {
          "inbox_email_ids": [1,2],
          "channel_id": 1,
          "channel_klass": "Channel::Microsoft",
          "retry_count": 1
      }
