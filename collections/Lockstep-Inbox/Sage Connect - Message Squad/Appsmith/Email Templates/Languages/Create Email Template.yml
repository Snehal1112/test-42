uid: 60278a4b-45ac-42db-9994-07f26db06997
info:
  name: Create Email Template
  type: http
  seq: 1
http:
  method: POST
  url: '{{BASE_URL}}/api/appsmith/v1/email_templates/create_locale_text'
  body:
    type: json
    data: |-
      {
      "subject": "<p style=\"margin:0\">Neue Rechnungen von <span class=\"editor-snippet\" data-lexical-snippet=\"true\" data-lexical-snippet-key=\"{{YourCompany}}\">Ihr Unternehmen</span></p>",
      "content": "<p style=\"margin:0\">Sie haben Rechnungen von <span class=\"editor-snippet\" data-lexical-snippet=\"true\" data-lexical-snippet-key=\"{{YourCompany}}\">Ihr Unternehmen</span> zur Überprüfung. Sie können die Einzelheiten dieser Rechnungen und Ihre Aufzeichnungen über unser Kundenkontoportal mit dem unten stehenden Link überprüfen:</p><p style=\"margin:0\"></p><p style=\"margin:0\"><span class=\"editor-snippet\" data-lexical-snippet=\"true\" data-lexical-snippet-key=\"{{InvoiceTable}}\">Rechnungstabelle</span></p><p style=\"margin:0\"></br></p><p style=\"margin:0\"><span class=\"editor-snippet\" data-lexical-snippet=\"true\" data-lexical-snippet-key=\"{{PortalLink}}\">Portal-Link</span></p><p style=\"margin:0\"><span class=\"editor-snippet\" data-lexical-snippet=\"true\" data-lexical-snippet-key=\"{{YourSignature}}\">Ihre Signatur</span></p><p style=\"margin:0\"></br></p><p style=\"margin:0\"><strong>Diese E-Mail wurde über Sage Network im Auftrag von </strong><span class=\"editor-snippet\" data-lexical-snippet=\"true\" data-lexical-snippet-key=\"{{YourCompany}}\">Ihr Unternehmen</span><strong> zugestellt. Antworten auf diese E-Mail gehen direkt an </strong><span class=\"editor-snippet\" data-lexical-snippet=\"true\" data-lexical-snippet-key=\"{{YourEmailAddress}}\">Ihre E-Mail-Adresse</span><strong>.</strong></p>",
      "locale_code":"de-DE",
      "email_template_id": 178,
      "template_name":"Rechnungsbenachrichtigung (Mehrere)",
      "template_description":"Informieren Sie Ihren Kunden, dass Details für mehrere neue Rechnungen verfügbar sind."
      }
  auth:
    type: basic
    username: '{{appsmith_username}}'
    password: '{{appsmith_password}}'
