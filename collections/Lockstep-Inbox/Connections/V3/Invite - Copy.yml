  body:
    type: json
    data: |-
      {
        "invite_type": "manual_select",
        "connection_ids": [
          "34026879-5952-4e4d-b1d8-6cddac9d4582",
          "0e6c20f6-6a52-4625-8f20-7ace76cf84db",
          "e967cac3-a32d-414e-b0d9-28befe61ffc8"
