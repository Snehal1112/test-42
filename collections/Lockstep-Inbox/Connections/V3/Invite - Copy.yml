        "subject": "Welcome to your online statement from {{DisplayName}}!",
        "content": "<p class=\"editor-paragraph\" style=\"margin: 0px;\"><span style=\"font-family: Arial, sans-serif; white-space: pre-wrap;\">Hi,</span></p><p class=\"editor-paragraph\" style=\"margin: 0px;\"><br></p><p class=\"editor-paragraph\" style=\"margin: 0px;\"><span style=\"font-family: Arial, sans-serif; white-space: pre-wrap;\">We are excited to offer you access to view your invoices online directly using your unique and secure link. In our customer account portal, you can view and download copies of open and closed invoices, export data, and more. To get started, click the link below.</span></p><p class=\"editor-paragraph\" style=\"margin: 0px;\"><br></p><p class=\"editor-paragraph\" style=\"margin: 0px;\"><span style=\"font-family: Arial, sans-serif; white-space: pre-wrap;\">Account Balance: </span><span style=\"font-family: 'Arial',sans-serif;\">{{AccountBalance}}</span></p><p class=\"editor-paragraph\" style=\"margin: 0px;\"><br></p><p class=\"editor-paragraph\" style=\"margin: 0px;\"><span style=\"font-family: Arial, sans-serif; white-space: pre-wrap;\">Balance Overdue: </span><span style=\"font-family: 'Arial',sans-serif;\">{{AmountOverdue}}</span></p><p class=\"editor-paragraph\" style=\"margin: 0px;\"><br></p><p class=\"editor-paragraph\" style=\"margin: 0px;\"><span style=\"font-family: 'Arial',sans-serif;\"><a type=\"portal-link\" href=\"{{PortalLink}}\" style=\"border-radius: 0.5rem;\n      display: inline-block;\n      color: rgb(255, 255, 255);\n      font-family: 'Arial',sans-serif;\n      font-style: normal;\n      font-weight: 500;\n      font-size: 0.875rem;\n      line-height: 1.25rem;\n      text-align: center;\n      text-transform: none;\n      background: #007E45;\n      padding: 0.625rem 0.75rem;\n      margin-bottom: 0.325rem;\n      -webkit-box-align: center;\n      text-decoration: none;\">Open Portal</a>&nbsp;&nbsp;&nbsp;The link will expire in 30 days.</span></p><p class=\"editor-paragraph\" style=\"margin: 0px;\"><br></p><p class=\"editor-paragraph\" style=\"margin: 0px;\"><span style=\"font-family: Arial, sans-serif; white-space: pre-wrap;\">Thank you,</span><br><span style=\"font-family: 'Arial',sans-serif;\">{{YourName}}</span><br><span style=\"font-family: 'Arial',sans-serif;\">{{DisplayName}}</span><br><span style=\"font-family: 'Arial',sans-serif;\"></span></p><p class=\"editor-paragraph\" style=\"margin: 0px;\"><br></p><p class=\"editor-paragraph\" style=\"margin: 0px;\"><br></p><p class=\"editor-paragraph\" style=\"margin: 0px;\"><b><strong class=\"editor-text-bold\" style=\"font-family: Arial, sans-serif; white-space: pre-wrap;\">This email was delivered through Sage on behalf of </strong></b><span style=\"font-family: 'Arial',sans-serif;\">{{DisplayName}}</span><b><strong class=\"editor-text-bold\" style=\"font-family: Arial, sans-serif; white-space: pre-wrap;\">. Replies to this email will go directly to </strong></b><span style=\"font-family: 'Arial',sans-serif;\">{{YourEmailAddress}}</span><b><strong class=\"editor-text-bold\" style=\"font-family: Arial, sans-serif; white-space: pre-wrap;\">.</strong></b></p><br>\n  <hr style=\"margin-block: 8px; border: 0.5px solid #c9c9c9\">\n  <p style=\"font-size: 10px; font-weight: 400; line-height: 1.5; color: #757575; font-family: 'Arial',sans-serif\">\n    This email and associated links are intended solely for the recipient. If received in error, please notify us and delete this message.\n  </p>",
        "attachment_ids": [],
        "pendo_data": {
          "visitor_id": "65b02b8b-d401-4de9-8edb-8603b1e9c2c8",
          "account_id": "a7207177-c7f2-d660-3cd6-05217252371d",
          "event": "Message Sent",
          "properties": {
            "invite_type": "Bulk Invitations",
            "template_name": "INVITE_CUSTOMER",
            "contains_portal_link": true
          }
        },
        "locale_code": "en-US"
      }
  auth:
    type: bearer
    token: '{{Bearer Token}}'
